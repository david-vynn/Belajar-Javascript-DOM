<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Book Tracker</title>
</head>
<body>
    
    <div class="container">
        <header>
            <h1>Book Tracker</h1>
        </header>

        <div class="input-box">
            <input type="text" class="input-text" id="inputText" placeholder="Buku apa nieehhh???">
            <button type="button" class="add-btn" id="addBtn">+</button>
        </div>

        <div class="list-box">
            <ul class="list-book" id="listBook">

            </ul>
        </div>

        <div class="info-container">
            <span class="tot-box">Total book : <span class="num-tot-book" id="numTotBook">0</span></span>

            <span class="done-box">Done book : <span class="num-done-book" id="numDoneBook">0</span></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
