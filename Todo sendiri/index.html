<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>To Do List David</title>
</head>
<body>
    
    <div class="container">
        <header>
            <i class="fa-solid fa-clipboard-list"></i>
            <div class="text-header">
                <h1>To Do List</h1>
                <span class="subtitle">Plan today, conquer tomorrow</span>
            </div>
        </header>
        <div class="input-container">
            <i class="fa-solid fa-file-lines input-icon"></i>
            <input type="text" placeholder="Add a new task..." id="inputList">
            <button class="add-btn" id="addBtn"><i class="fa-solid fa-plus"></i></button>
        </div>
        <div class="date-container">
            <span class="today"><i class="fa-solid fa-list"></i>Today</span>
            <span class="jumlahTask">3 Task</span>
        </div>
        <div class="list-container">
            <ul class="task-list">
                <li class="list-info">
                    <label class="checkbox-container">
                        <input type="checkbox" class="checkmark">
                        <span class="custom-check"></span>
                    </label>
                    <div class="task-title">
                        <span class="task-name">Belajar Javascript</span>
                        <span class="categoration"><i class="fa-solid fa-book-open"></i>Study</span>
                    </div>
                </li>
                <button class="trash"><i class="fa-regular fa-trash-can"></i></button>
            </ul>
        </div>
        <div class="info-container">
            <div class="total-info">
                <i class="fa-solid fa-clipboard-list"></i>
                <span class="total-box">
                    <span class="total-task">Total Task</span>
                    <span class="count-task">3</span>
                </span>
            </div>
            <div class="completed-info">
                <i class="fa-solid fa-circle-check"></i>
                <span class="completed-box">
                    <span class="completed-task">Completed</span>
                    <span class="count-completed">1</span>
                </span>
            </div>
            <div class="remaining-info">
                <i class="fa-solid fa-hourglass-half"></i>
                <span class="remaining-box">
                    <span class="remaining-task">Remaining</span>
                    <span class="count-remaining">2</span>
                </span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
